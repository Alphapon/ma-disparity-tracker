name: Update data

on:
  schedule:
    - cron: '40 6 * * 1-5'    # 15:40 KST 월–금 (국장 마감 후)
    - cron: '10 22 * * 1-5'   # 07:10 KST 화–토 (미장 마감 후)
  workflow_dispatch:           # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch data
        run: python update_data.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
